aid: etherscan
name: Etherscan
description: >-
  Etherscan is the leading blockchain explorer, search, API, and analytics
  platform for Ethereum and other EVM-compatible chains. It allows users to
  easily access and explore blockchain data, including transaction histories,
  smart contracts, token balances, and network activity. Etherscan's unified
  V2 API covers 60+ chains under a single account and API key, with a free
  tier offering 100,000 daily calls and paid tiers up to enterprise.
