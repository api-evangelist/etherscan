aid: etherscan
name: Etherscan
review_type: AsyncAPI / WebSocket Availability
reviewed: '2026-05-29'
reviewer: API Evangelist
sources:
  - https://docs.etherscan.io/
  - https://docs.etherscan.io/llms.txt
  - https://etherscan.io/apis
summary: >-
  Etherscan's public developer surface is a unified V2 REST/HTTP API covering Ethereum
  and 60+ EVM-compatible chains under a single API key. The complete documentation
  index (llms.txt) was crawled and every documented endpoint is a request/response
  HTTP API. No public WebSocket, streaming, server-sent events, pub/sub, or push
  subscription endpoint is documented. The provider also does not publish a webhook
  product in the V2 docs index at the time of review.
protocols_documented:
  - HTTPS REST (api.etherscan.io/v2/api with module/action query parameters)
  - JSON-RPC style proxy endpoints (eth_blockNumber, eth_call, eth_getBlockByNumber,
    eth_getTransactionByHash, eth_sendRawTransaction, etc.) exposed over the same
    HTTPS REST surface
  - Model Context Protocol (MCP) integration for AI agents (https://docs.etherscan.io/ai/mcp)
websocket_available: false
websocket_evidence:
  - The full llms.txt documentation index lists no endpoint, page, or section
    referencing WebSocket, ws://, wss://, streaming, subscriptions, push, pub/sub,
    or server-sent events.
  - The Etherscan API pricing/products page (https://etherscan.io/apis) advertises
    REST API tiers only, with rate limits expressed as calls/second and credits/day,
    consistent with a polled REST surface.
  - The V2 migration guide and getting-started pages describe a single REST base URL
    (https://api.etherscan.io/v2/api) and a chainid query parameter for multi-chain
    access, with no alternate WebSocket base URL.
webhooks_available: false
webhooks_evidence:
  - The llms.txt documentation index does not list any webhook configuration,
    subscription, signing, or delivery endpoint as of 2026-05-29.
  - No "Webhooks" section appears under api-reference, resources, or v2 sections of
    the documentation tree.
real_time_alternatives_noted:
  - For real-time blockchain data, Etherscan users are expected to either (a) poll
    the REST endpoints (eth_blockNumber, getlogs, txlist, gasoracle) or (b) connect
    directly to an Ethereum node / third-party RPC provider that exposes the
    standard Ethereum JSON-RPC eth_subscribe WebSocket method. Etherscan itself
    does not publicly expose that WebSocket surface.
asyncapi_action: not_created
asyncapi_reason: >-
  No documented public WebSocket, streaming, or event-driven endpoint exists to
  describe. Creating an AsyncAPI specification would require fabricating channels,
  bindings, and messages that the provider does not publish. Per the no-fabrication
  rule, asyncapi/etherscan-asyncapi.yml was intentionally not created and
  apis.yml was not modified.
apis_yml_action: not_modified
recommendation: >-
  Re-check on each Etherscan changelog release (https://docs.etherscan.io/changelog)
  for any future addition of WebSocket or webhook delivery. If/when Etherscan ships
  a documented streaming or webhook surface, generate an AsyncAPI 3.0 specification
  at asyncapi/etherscan-asyncapi.yml and add a corresponding properties entry of
  type AsyncAPI to the apis.yml record.
